<!DOCTYPE html>
<html lang="en" dir="ltr" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CP Issues">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#8B1A4A">
<title>CP Amman — Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cp:#8B1A4A; --cp-dark:#6B1238; --cp-light:#B8427A; --cp-pale:rgba(139,26,74,0.08);
  --black:#0f0f0f; --white:#ffffff; --off:#f6f4f7; --surface:#ffffff;
  --surface2:#f0edf2; --border:#e5dfe8; --text:#1a1a1a; --muted:#6b6b7b;
  --green:#16a34a; --green-bg:rgba(22,163,74,0.08);
  --orange:#d97706; --orange-bg:rgba(217,119,6,0.08);
  --red:#dc2626; --red-bg:rgba(220,38,38,0.08);
  --blue:#2563eb; --blue-bg:rgba(37,99,235,0.08);
  --yellow:#ca8a04; --yellow-bg:rgba(202,138,4,0.08);
  --radius:14px; --shadow:0 2px 8px rgba(0,0,0,0.06),0 0 1px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--off);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;}
body.rtl{direction:rtl;}

/* ── HEADER ── */
.header{
  background:var(--cp);color:var(--white);
  padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(139,26,74,0.3);
}
.header-left{display:flex;align-items:center;gap:14px;}
.cp-logo-small{height:28px;filter:brightness(0) invert(1);opacity:0.9;}
.header-title{font-size:15px;font-weight:600;letter-spacing:0.2px;}
.header-subtitle{font-size:11px;opacity:0.65;letter-spacing:0.5px;}
.header-right{display:flex;align-items:center;gap:10px;}
.hbtn{
  padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;
  border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.12);
  color:var(--white);
}
.hbtn:hover{background:rgba(255,255,255,0.22);}
.hbtn.primary{background:var(--white);color:var(--cp);border-color:var(--white);}
.hbtn.primary:hover{background:#f0e8ec;}
.lang-toggle-header{display:flex;gap:4px;}
.lang-h-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.6);font-family:'Inter',sans-serif;transition:all 0.2s;}
.lang-h-btn.active{background:rgba(255,255,255,0.2);color:var(--white);}

/* ── STATS BAR ── */
.stats-bar{display:flex;gap:12px;padding:20px 24px 0;overflow-x:auto;scrollbar-width:none;}
.stats-bar::-webkit-scrollbar{display:none;}
.stat-card{
  background:var(--white);border-radius:var(--radius);
  padding:16px 20px;min-width:130px;flex-shrink:0;
  box-shadow:var(--shadow);border:1px solid var(--border);
}
.stat-num{font-size:30px;font-weight:700;font-family:'Playfair Display',serif;color:var(--text);}
.stat-num.cp{color:var(--cp);}
.stat-num.orange{color:var(--orange);}
.stat-num.green{color:var(--green);}
.stat-num.red{color:var(--red);}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500;}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;gap:10px;padding:16px 24px;
  align-items:center;flex-wrap:wrap;
}
.search-wrap{flex:1;min-width:200px;position:relative;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;opacity:0.4;}
.search-input{
  width:100%;background:var(--white);border:1.5px solid var(--border);
  border-radius:10px;padding:10px 14px 10px 36px;font-size:14px;
  font-family:'Inter',sans-serif;color:var(--text);outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.search-input:focus{border-color:var(--cp);box-shadow:0 0 0 3px var(--cp-pale);}
.filter-select{
  background:var(--white);border:1.5px solid var(--border);border-radius:10px;
  padding:9px 12px;font-size:13px;font-family:'Inter',sans-serif;
  color:var(--text);outline:none;cursor:pointer;min-width:130px;
  transition:border-color 0.2s;
}
.filter-select:focus{border-color:var(--cp);}
.add-btn{
  padding:10px 18px;background:var(--cp);color:var(--white);
  border:none;border-radius:10px;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;
  white-space:nowrap;display:flex;align-items:center;gap:6px;
}
.add-btn:hover{background:var(--cp-dark);box-shadow:0 4px 16px rgba(139,26,74,0.3);}

/* ── ISSUES GRID ── */
.issues-container{padding:0 24px 24px;}
.issues-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}

/* ── ISSUE CARD ── */
.issue-card{
  background:var(--white);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1px solid var(--border);
  overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;
}
.issue-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.1);}

/* Status stripe */
.issue-card::before{content:'';display:block;height:4px;}
.issue-card.open::before{background:var(--red);}
.issue-card.in-progress::before{background:var(--orange);}
.issue-card.resolved::before{background:var(--green);}
.issue-card.not-fixable::before{background:var(--muted);}

/* Photo thumbnail */
.issue-thumb{
  position:relative;width:100%;height:190px;
  background:var(--surface2);overflow:hidden;cursor:pointer;
}
.issue-thumb img{
  width:100%;height:100%;object-fit:cover;
  transition:transform 0.3s;display:block;
}
.issue-card:hover .issue-thumb img{transform:scale(1.03);}
.thumb-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.55) 100%);
}
.thumb-stamp{
  position:absolute;bottom:10px;left:12px;right:12px;
  display:flex;flex-direction:column;gap:3px;
}
.stamp-location{
  font-size:12px;font-weight:600;color:var(--white);
  background:rgba(139,26,74,0.85);
  padding:3px 8px;border-radius:6px;
  display:inline-flex;align-items:center;gap:5px;
  backdrop-filter:blur(4px);width:fit-content;
}
.stamp-date{
  font-size:10px;font-weight:500;color:rgba(255,255,255,0.85);
  background:rgba(0,0,0,0.4);
  padding:2px 7px;border-radius:5px;backdrop-filter:blur(4px);
  width:fit-content;
}
.no-photo{
  width:100%;height:190px;background:var(--surface2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--muted);font-size:13px;
}
.no-photo-icon{font-size:36px;opacity:0.3;}
.download-btn{
  position:absolute;top:10px;right:10px;
  background:rgba(255,255,255,0.9);color:var(--text);
  border:none;border-radius:8px;padding:6px 10px;
  font-size:12px;font-weight:600;cursor:pointer;
  backdrop-filter:blur(4px);transition:all 0.2s;
  display:flex;align-items:center;gap:4px;
  font-family:'Inter',sans-serif;
}
.download-btn:hover{background:var(--white);box-shadow:0 2px 8px rgba(0,0,0,0.15);}

/* Card body */
.issue-body{padding:14px 16px 16px;}
.issue-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px;}
.issue-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;flex:1;}
.status-badge{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;
  white-space:nowrap;flex-shrink:0;letter-spacing:0.3px;
  text-transform:uppercase;
}
.badge-open{background:var(--red-bg);color:var(--red);}
.badge-in-progress{background:var(--orange-bg);color:var(--orange);}
.badge-resolved{background:var(--green-bg);color:var(--green);}
.badge-not-fixable{background:#f3f3f5;color:var(--muted);}

.issue-meta{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.meta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.meta-icon{font-size:12px;}

.issue-comment{
  font-size:12px;color:var(--muted);line-height:1.5;
  margin-bottom:12px;padding:8px 10px;
  background:var(--off);border-radius:8px;border-left:3px solid var(--border);
}
body.rtl .issue-comment{border-left:none;border-right:3px solid var(--border);}

/* ETA badge */
.eta-badge{
  font-size:11px;font-weight:500;color:var(--orange);
  background:var(--orange-bg);padding:4px 10px;border-radius:6px;
  display:inline-flex;align-items:center;gap:5px;margin-bottom:10px;
}

/* Resolution photo */
.resolution-photo{
  margin-bottom:10px;border-radius:8px;overflow:hidden;
  border:1px solid var(--border);
}
.resolution-photo img{width:100%;height:100px;object-fit:cover;display:block;}
.resolution-note{
  font-size:11px;color:var(--green);padding:5px 8px;
  background:var(--green-bg);border-radius:0 0 8px 8px;
  font-weight:500;
}

/* Card actions */
.card-actions{display:flex;gap:6px;flex-wrap:wrap;}
.card-btn{
  flex:1;min-width:70px;padding:7px 8px;border-radius:8px;
  font-size:11px;font-weight:600;cursor:pointer;border:none;
  transition:all 0.2s;font-family:'Inter',sans-serif;text-align:center;
}
.btn-edit{background:var(--cp-pale);color:var(--cp);}
.btn-edit:hover{background:rgba(139,26,74,0.15);}
.btn-delete{background:var(--red-bg);color:var(--red);}
.btn-delete:hover{background:rgba(220,38,38,0.15);}
.btn-status{background:var(--surface2);color:var(--text);}
.btn-status:hover{background:var(--border);}

/* ── EMPTY STATE ── */
.empty-state{
  grid-column:1/-1;text-align:center;padding:80px 20px;
  color:var(--muted);
}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:0.4;}
.empty-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:14px;}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  backdrop-filter:blur(6px);z-index:500;
  display:none;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--white);border-radius:20px;
  width:100%;max-width:580px;max-height:90vh;
  overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);
}
.modal-header{
  padding:22px 24px 18px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--white);z-index:2;
}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:4px;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:20px 24px 24px;}

/* Modal form */
.mfield{margin-bottom:16px;}
.mfield label{
  display:block;font-size:11px;font-weight:600;letter-spacing:0.8px;
  text-transform:uppercase;color:var(--cp);margin-bottom:6px;
}
.mfield input,.mfield select,.mfield textarea{
  width:100%;background:var(--off);border:1.5px solid var(--border);
  border-radius:10px;padding:11px 14px;font-size:14px;
  font-family:'Inter',sans-serif;color:var(--text);outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.mfield textarea{resize:vertical;min-height:80px;line-height:1.5;}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{
  border-color:var(--cp);box-shadow:0 0 0 3px var(--cp-pale);
}
.mfield-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.optional-tag{font-size:10px;color:var(--muted);font-weight:400;margin-left:4px;text-transform:none;letter-spacing:0;}

/* Photo upload */
.photo-upload-area{
  border:2px dashed var(--border);border-radius:12px;
  padding:24px;text-align:center;cursor:pointer;
  transition:all 0.2s;background:var(--off);
  position:relative;
}
.photo-upload-area:hover{border-color:var(--cp);background:var(--cp-pale);}
.photo-upload-area.has-photo{border-style:solid;border-color:var(--cp);}
.upload-icon{font-size:32px;margin-bottom:8px;opacity:0.5;}
.upload-text{font-size:13px;color:var(--muted);}
.upload-preview{
  width:100%;max-height:200px;object-fit:cover;
  border-radius:8px;display:none;margin-top:10px;
}
.photo-upload-area input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}

/* Dept checkboxes */
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.dept-check{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);
  cursor:pointer;transition:all 0.2s;font-size:13px;font-weight:500;
}
.dept-check:hover{border-color:var(--cp);background:var(--cp-pale);}
.dept-check input{accent-color:var(--cp);}
.dept-check.checked{border-color:var(--cp);background:var(--cp-pale);color:var(--cp);}

/* Save btn */
.modal-save-btn{
  width:100%;padding:14px;background:var(--cp);color:var(--white);
  border:none;border-radius:10px;font-family:'Inter',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;
  margin-top:4px;
}
.modal-save-btn:hover{background:var(--cp-dark);}

/* Image lightbox */
.lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,0.92);
  z-index:900;display:none;align-items:center;justify-content:center;
  padding:20px;
}
.lightbox.show{display:flex;}
.lightbox img{max-width:100%;max-height:90vh;border-radius:8px;object-fit:contain;}
.lightbox-close{
  position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);
  border:none;border-radius:50%;width:40px;height:40px;
  color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--text);color:var(--white);padding:11px 22px;border-radius:100px;
  font-size:13px;font-weight:500;transition:transform 0.3s;z-index:999;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.25);
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Priority badge */
.priority-high{color:var(--red);}
.priority-medium{color:var(--orange);}
.priority-low{color:var(--green);}

/* RTL adjustments */
body.rtl .search-icon{left:auto;right:12px;}
body.rtl .search-input{padding:10px 36px 10px 14px;}
body.rtl .issue-comment{border-left:none;border-right:3px solid var(--border);}
body.rtl .stamp-location,.stamp-date{left:auto;right:12px;}
body.rtl .download-btn{right:auto;left:10px;}

/* Responsive */
@media(max-width:600px){
  .stats-bar{padding:14px 16px 0;}
  .toolbar,.issues-container{padding-left:16px;padding-right:16px;}
  .issues-grid{grid-template-columns:1fr;}
  .mfield-row{grid-template-columns:1fr;}
  .header{padding:0 16px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <img class="cp-logo-small" src="cp_logo.png" alt="CP">
    <div>
      <div class="header-title" id="hTitle">Issue Tracker — Management</div>
      <div class="header-subtitle" id="hSub">Crowne Plaza Amman</div>
    </div>
  </div>
  <div class="header-right">
    <div class="lang-toggle-header">
      <button class="lang-h-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-h-btn" onclick="setLang('ar')">ع</button>
    </div>
    <button class="hbtn primary" id="addIssueBtn" onclick="openAddModal()">+ Add Issue</button>
    <button class="hbtn" onclick="doLogout()" id="logoutBtn">Logout</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar" id="statsBar">
  <div class="stat-card"><div class="stat-num cp" id="statTotal">0</div><div class="stat-label" id="slTotal">Total Issues</div></div>
  <div class="stat-card"><div class="stat-num red" id="statOpen">0</div><div class="stat-label" id="slOpen">Open</div></div>
  <div class="stat-card"><div class="stat-num orange" id="statProgress">0</div><div class="stat-label" id="slProgress">In Progress</div></div>
  <div class="stat-card"><div class="stat-num green" id="statResolved">0</div><div class="stat-label" id="slResolved">Resolved</div></div>
  <div class="stat-card"><div class="stat-num" id="statNotFixable">0</div><div class="stat-label" id="slNotFixable">Not Fixable</div></div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search issues, locations, departments…" oninput="renderIssues()">
  </div>
  <select class="filter-select" id="filterStatus" onchange="renderIssues()">
    <option value="">All Statuses</option>
    <option value="open">Open</option>
    <option value="in-progress">In Progress</option>
    <option value="resolved">Resolved</option>
    <option value="not-fixable">Not Fixable</option>
  </select>
  <select class="filter-select" id="filterDept" onchange="renderIssues()">
    <option value="">All Departments</option>
    <option value="Engineering">Engineering</option>
    <option value="Housekeeping">Housekeeping</option>
    <option value="Front Office">Front Office</option>
    <option value="F&B">F&B</option>
    <option value="Security">Security</option>
  </select>
  <select class="filter-select" id="filterPriority" onchange="renderIssues()">
    <option value="">All Priorities</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>
</div>

<!-- ISSUES GRID -->
<div class="issues-container">
  <div class="issues-grid" id="issuesGrid">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title" id="emptyTitle">No issues yet</div>
      <div class="empty-sub" id="emptySub">Click "Add Issue" to report the first one</div>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="issueModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Report New Issue</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="mfield">
        <label id="mlTitle">Issue Title</label>
        <input type="text" id="fTitle" placeholder="e.g. AC not working in Room 302">
      </div>
      <div class="mfield-row">
        <div class="mfield">
          <label id="mlLocation">Location</label>
          <input type="text" id="fLocation" placeholder="e.g. Room 302 / Lobby">
        </div>
        <div class="mfield">
          <label id="mlPriority">Priority</label>
          <select id="fPriority">
            <option value="high">🔴 High</option>
            <option value="medium" selected>🟠 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
      </div>
      <div class="mfield-row">
        <div class="mfield">
          <label id="mlEtaFrom">ETA From <span class="optional-tag">(optional)</span></label>
          <input type="date" id="fEtaFrom">
        </div>
        <div class="mfield">
          <label id="mlEtaTo">ETA To <span class="optional-tag">(optional)</span></label>
          <input type="date" id="fEtaTo">
        </div>
      </div>
      <div class="mfield">
        <label id="mlComment">Comment <span class="optional-tag">(optional)</span></label>
        <textarea id="fComment" placeholder="Describe the issue in detail…"></textarea>
      </div>
      <div class="mfield">
        <label id="mlDepts">Assign to Departments</label>
        <div class="dept-grid" id="deptGrid">
          <label class="dept-check"><input type="checkbox" value="Engineering"> Engineering</label>
          <label class="dept-check"><input type="checkbox" value="Housekeeping"> Housekeeping</label>
          <label class="dept-check"><input type="checkbox" value="Front Office"> Front Office</label>
          <label class="dept-check"><input type="checkbox" value="F&B"> F&B</label>
          <label class="dept-check"><input type="checkbox" value="Security"> Security</label>
        </div>
      </div>
      <div class="mfield">
        <label id="mlPhoto">Photo <span class="optional-tag">(optional)</span></label>
        <div class="photo-upload-area" id="photoUploadArea">

async function uploadToR2(base64DataUrl, filename){
  // Convert base64 data URL to Blob
  var arr    = base64DataUrl.split(',');
  var mime   = arr[0].match(/:(.*?);/)[1];
  var bstr   = atob(arr[1]);
  var n      = bstr.length;
  var u8arr  = new Uint8Array(n);
  while(n--){ u8arr[n] = bstr.charCodeAt(n); }
  var blob   = new Blob([u8arr], { type: mime });

  var form = new FormData();
  form.append('file', blob, filename);
  form.append('filename', filename);

  var res = await fetch(R2_WORKER_URL, { method: 'POST', body: form });
  if(!res.ok) throw new Error('R2 upload failed: ' + res.status);
  var data = await res.json();
  if(data.error) throw new Error(data.error);
  return data.url;
}

function renderIssues(){
  var issues = window.__issues||{};
  var search  = (document.getElementById('searchInput').value||'').toLowerCase();
  var fStatus = document.getElementById('filterStatus').value;
  var fDept   = document.getElementById('filterDept').value;
  var fPriority=document.getElementById('filterPriority').value;

  var ids = Object.keys(issues).filter(function(id){
    var issue = issues[id];
    var matchSearch = !search ||
      (issue.title||'').toLowerCase().includes(search) ||
      (issue.location||'').toLowerCase().includes(search) ||
      (issue.comment||'').toLowerCase().includes(search) ||
      (issue.assignedDepts||[]).join(' ').toLowerCase().includes(search);
    var matchStatus   = !fStatus   || issue.status===fStatus;
    var matchDept     = !fDept     || (issue.assignedDepts||[]).includes(fDept);
    var matchPriority = !fPriority || issue.priority===fPriority;
    return matchSearch && matchStatus && matchDept && matchPriority;
  });

  // Sort: open first, then in-progress, then by date desc
  var order = {'open':0,'in-progress':1,'resolved':2,'not-fixable':3};
  ids.sort(function(a,b){
    var oa=order[issues[a].status]||0, ob=order[issues[b].status]||0;
    if(oa!==ob) return oa-ob;
    return (issues[b].createdAt||'') > (issues[a].createdAt||'') ? 1 : -1;
  });

  var grid = document.getElementById('issuesGrid');
  if(ids.length===0){
    grid.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">'+t('emptyTitle')+'</div><div class="empty-sub">'+t('emptySub')+'</div></div>';
    return;
  }
  grid.innerHTML = ids.map(function(id){ return buildCard(id, issues[id]); }).join('');
}

        '<div class="stamp-location">📍 '+escHtml(issue.location||'')+'</div>'+
        '<div class="stamp-date">'+date+'</div>'+
      '</div>'+
      '<button class="download-btn" onclick="event.stopPropagation();downloadPhoto(\''+escHtml(issue.photoURL)+'\',\''+escHtml(issue.title||'issue')+'\')">⬇ '+t('downloadBtn')+'</button>'+
    '</div>';
  } else {
    photoHtml = '<div class="no-photo"><div class="no-photo-icon">📷</div><span>'+t('noPhoto')+'</span></div>';
  }

  // ETA
  var etaHtml = '';

    etaHtml = '<div class="eta-badge">📅 '+t('etaLabel')+': '+(issue.etaFrom||'?')+' → '+(issue.etaTo||'?')+'</div>';
  }

  // Comment
  var commentHtml = issue.comment ? '<div class="issue-comment">'+escHtml(issue.comment)+'</div>' : '';

  // Resolution photo from dept
  var resHtml = '';
  if(issue.resolutionPhotoURL){
    resHtml = '<div class="resolution-photo">'+
      '<img src="'+escHtml(issue.resolutionPhotoURL)+'" alt="" loading="lazy">'+
      '<div class="resolution-note">✅ '+t('resolutionPhoto')+(issue.deptNote?' — '+escHtml(issue.deptNote):'')+'</div>'+
    '</div>';
  } else if(issue.deptNote){
    resHtml = '<div class="issue-comment" style="border-color:var(--green);color:var(--green)">💬 '+escHtml(issue.deptNote)+'</div>';
  }

  return '<div class="issue-card '+issue.status+'" id="card_'+id+'">'+
    photoHtml+
    '<div class="issue-body">'+
      '<div class="issue-header">'+
        '<div class="issue-title">'+escHtml(issue.title||'')+'</div>'+
        '<span class="status-badge '+statusBadge[issue.status]+'">'+statusLabels[issue.status]+'</span>'+
      '</div>'+

        '<span class="meta-item '+priorityColor[issue.priority]+'"><span class="meta-icon">'+priorityIcon[issue.priority]+'</span>'+t(issue.priority||'medium')+'</span>'+
        (depts?'<span class="meta-item"><span class="meta-icon">🏨</span>'+escHtml(depts)+'</span>':'')+
      '</div>'+
      etaHtml+
      commentHtml+
      resHtml+
      '<div class="card-actions">'+
        '<button class="card-btn btn-edit" onclick="openEditModal(\''+id+'\')">✏️ '+t('editBtn')+'</button>'+
        '<button class="card-btn btn-status" onclick="openStatusModal(\''+id+'\')">🔄 '+t('statusBtn')+'</button>'+
        '<button class="card-btn btn-delete" onclick="deleteIssue(\''+id+'\',\''+escHtml(issue.r2Key||'')+'\')">🗑 '+t('deleteBtn')+'</button>'+

async function saveIssue(){
  if(!window.__fbReady){ showToast('Firebase not ready'); return; }
  var title    = document.getElementById('fTitle').value.trim();
  var location = document.getElementById('fLocation').value.trim();
  if(!title){ showToast('Please enter a title'); return; }
  if(!location){ showToast('Please enter a location'); return; }

  var btn = document.getElementById('modalSaveBtn');
  btn.textContent='Saving…'; btn.disabled=true;

  var depts = [];
  document.querySelectorAll('.dept-check input:checked').forEach(function(cb){ depts.push(cb.value); });

  var issueData = {
    title: title, location: location,
    priority: document.getElementById('fPriority').value,
    etaFrom: document.getElementById('fEtaFrom').value,
    etaTo: document.getElementById('fEtaTo').value,
    comment: document.getElementById('fComment').value.trim(),
    assignedDepts: depts,
    status: 'open',
    updatedAt: new Date().toISOString(),
    reportedBy: session.nameEn||session.username,
  };

  var editId = document.getElementById('fEditId').value;
  if(editId){
    var existing = (window.__issues||{})[editId];
    issueData.status = existing ? existing.status : 'open';
    issueData.createdAt = existing ? existing.createdAt : new Date().toISOString();
  } else {
    issueData.createdAt = new Date().toISOString();
  }

  // Upload photo → Cloudflare R2
  if(selectedPhotoBase64){
    try{
      var photoId = (editId || Date.now().toString()) + '_' + Math.random().toString(36).substr(2,6);
      var filename = 'issues/' + photoId + '.jpg';
      var uploadedUrl = await uploadToR2(selectedPhotoBase64, filename);
      issueData.photoURL   = uploadedUrl;
      issueData.r2Key      = filename;
      issueData.storageRef = '';  // no Firebase Storage
    }catch(e){
      showToast('Photo upload failed: ' + e.message);
      btn.textContent=editId?t('updateBtn'):t('saveBtn'); btn.disabled=false;
      return;
    }
  } else {
    issueData.photoURL = document.getElementById('fExistingPhoto').value || '';
  }

  try{
    if(editId){
      await window.__update(window.__ref(window.__db,'cpissues/issues/'+editId), issueData);
    } else {
      await window.__push(window.__ref(window.__db,'cpissues/issues'), issueData);
    }
    showToast(t('toastSaved'));
    closeModal();
  }catch(e){
    showToast('Error saving: '+e.message);
  }
  btn.textContent=editId?t('updateBtn'):t('saveBtn'); btn.disabled=false;
}

  if(!id) return;
  await window.__update(window.__ref(window.__db,'cpissues/issues/'+id),{
    status:status, etaFrom:etaFrom, etaTo:etaTo,
    mgmtNote: note, updatedAt:new Date().toISOString()
  });
  showToast(t('toastUpdated'));
  closeStatusModal();
}

// ── Delete ────────────────────────────────────────────────────────
async function deleteIssue(id, r2Key){
  if(!confirm(t('confirmDelete'))) return;
  await window.__remove(window.__ref(window.__db,'cpissues/issues/'+id));
  // Delete from R2 via worker if key exists
  if(r2Key){
    try{
      await fetch(R2_WORKER_URL + '?action=delete&key=' + encodeURIComponent(r2Key), { method:'DELETE' });
    }catch(e){ /* non-critical */ }
  }
  showToast(t('toastDeleted'));
}

// ── Photo actions ─────────────────────────────────────────────────
function openLightbox(url){
  document.getElementById('lightboxImg').src=url;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('show'); }

function downloadPhoto(url, name){
  var a=document.createElement('a');
  a.href=url; a.download=(name||'photo')+'.jpg';
  a.target='_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ── Dept check styling ────────────────────────────────────────────
document.querySelectorAll('.dept-check').forEach(function(el){
  el.addEventListener('change', function(){ el.classList.toggle('checked', el.querySelector('input').checked); });
});

// ── Helpers ───────────────────────────────────────────────────────
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2800); }
</script>

      .then(function() { console.log("[CP Issues] SW ready"); })
      .catch(function(e) { console.log("[CP Issues] SW error", e); });
  });
}
