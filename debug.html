<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CP Debug</title>
<style>
body{font-family:monospace;padding:20px;background:#1a1a1a;color:#eee;font-size:13px;}
h2{color:#B8427A;margin-bottom:16px;}
.test{background:#2a2a2a;border-radius:8px;padding:14px;margin-bottom:12px;border-left:4px solid #555;}
.test.ok{border-color:#16a34a;}.test.fail{border-color:#dc2626;}.test.running{border-color:#d97706;}
.label{font-weight:bold;margin-bottom:6px;font-size:14px;}
.result{color:#aaa;word-break:break-all;margin-top:6px;white-space:pre-wrap;}
.ok .result{color:#4ade80;}.fail .result{color:#f87171;}
button{background:#8B1A4A;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;margin-bottom:20px;}
</style>
</head>
<body>
<h2>🔧 CP Issue Tracker — Diagnostics</h2>
<button onclick="runAll()">▶ Run All Tests</button>
<div id="out"></div>
<script src="config.js"></script>
<script>
function addTest(id,label){ var d=document.createElement('div'); d.className='test running'; d.id='t_'+id; d.innerHTML='<div class="label">'+label+'</div><div class="result" id="r_'+id+'">Running…</div>'; document.getElementById('out').appendChild(d); }
function setResult(id,ok,msg){ document.getElementById('t_'+id).className='test '+(ok?'ok':'fail'); document.getElementById('r_'+id).textContent=(ok?'✅ ':'❌ ')+msg; }

async function runAll(){
  document.getElementById('out').innerHTML='';
  var cfg=window.CP_CONFIG;

  // 1. Config check
  addTest('cfg','Config values');
  if(cfg.SUPABASE_URL&&!cfg.SUPABASE_URL.includes('YOUR_PROJECT')&&cfg.SUPABASE_KEY&&!cfg.SUPABASE_KEY.includes('YOUR_ANON')&&cfg.IMGBB_API_KEY&&!cfg.IMGBB_API_KEY.includes('YOUR_IMGBB')){
    setResult('cfg',true,'SUPABASE_URL='+cfg.SUPABASE_URL+'\nKEY='+cfg.SUPABASE_KEY.substring(0,30)+'…\nIMGBB='+cfg.IMGBB_API_KEY.substring(0,10)+'…');
  } else { setResult('cfg',false,'One or more config values still have placeholder text — check config.js'); return; }

  // 2. Supabase connectivity
  addTest('supa','Supabase connection (GET /rest/v1/users)');
  try{
    var r=await fetch(cfg.SUPABASE_URL+'/rest/v1/users?limit=1',{
      headers:{'apikey':cfg.SUPABASE_KEY,'Authorization':'Bearer '+cfg.SUPABASE_KEY,'Accept':'application/json'}
    });
    var body=await r.text();
    if(r.ok){ setResult('supa',true,'HTTP '+r.status+' — '+body.substring(0,120)); }
    else { setResult('supa',false,'HTTP '+r.status+' — '+body.substring(0,300)); }
  }catch(e){ setResult('supa',false,'Network error: '+e.message); }

  // 3. Supabase issues table
  addTest('issues','Supabase issues table (GET /rest/v1/issues)');
  try{
    var r=await fetch(cfg.SUPABASE_URL+'/rest/v1/issues?limit=1',{
      headers:{'apikey':cfg.SUPABASE_KEY,'Authorization':'Bearer '+cfg.SUPABASE_KEY,'Accept':'application/json'}
    });
    var body=await r.text();
    if(r.ok){ setResult('issues',true,'HTTP '+r.status+' — '+body.substring(0,120)); }
    else{ setResult('issues',false,'HTTP '+r.status+' — '+body.substring(0,300)); }
  }catch(e){ setResult('issues',false,'Network error: '+e.message); }

  // 4. ImgBB
  addTest('imgbb','ImgBB API key (1x1 pixel test upload)');
  try{
    // 1x1 red pixel PNG base64
    var px='iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg==';
    var form=new FormData(); form.append('image',px);
    var r=await fetch('https://api.imgbb.com/1/upload?key='+cfg.IMGBB_API_KEY,{method:'POST',body:form});
    var d=await r.json();
    if(d.success){ setResult('imgbb',true,'Upload OK — URL: '+d.data.url); }
    else{ setResult('imgbb',false,'API error: '+JSON.stringify(d.error||d)); }
  }catch(e){ setResult('imgbb',false,'Network error: '+e.message); }

  // 5. Key format check
  addTest('keyformat','Supabase key format');
  var key=cfg.SUPABASE_KEY;
  if(key.startsWith('eyJ')){ setResult('keyformat',true,'JWT format (eyJ…) — correct for REST API'); }
  else if(key.startsWith('sb_publishable_')){ setResult('keyformat',false,'This is a publishable key — you need the JWT anon key. Go to Supabase → Project Settings → Data API → anon key (starts with eyJ…)'); }
  else{ setResult('keyformat',false,'Unknown key format: '+key.substring(0,20)+'…'); }
}
runAll();
</script>
</body>
</html>
