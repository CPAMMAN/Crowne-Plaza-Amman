<!DOCTYPE html>
<html lang="en" dir="ltr" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CP Issues">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#8B1A4A">
<title>CP Amman — Department</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cp:#8B1A4A; --cp-dark:#6B1238; --cp-light:#B8427A; --cp-pale:rgba(139,26,74,0.08);
  --black:#0f0f0f; --white:#ffffff; --off:#f6f4f7; --surface:#ffffff;
  --surface2:#f0edf2; --border:#e5dfe8; --text:#1a1a1a; --muted:#6b6b7b;
  --green:#16a34a; --green-bg:rgba(22,163,74,0.08);
  --orange:#d97706; --orange-bg:rgba(217,119,6,0.08);
  --red:#dc2626; --red-bg:rgba(220,38,38,0.08);
  --radius:14px; --shadow:0 2px 8px rgba(0,0,0,0.06),0 0 1px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--off);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;}
body.rtl{direction:rtl;}

/* HEADER */
.header{
  background:var(--cp);color:var(--white);
  padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(139,26,74,0.3);
}
.header-left{display:flex;align-items:center;gap:14px;}
.cp-logo-small{height:28px;filter:brightness(0) invert(1);opacity:0.9;}
.header-title{font-size:15px;font-weight:600;}
.dept-badge{
  font-size:11px;background:rgba(255,255,255,0.18);
  padding:3px 10px;border-radius:100px;font-weight:600;
}
.header-right{display:flex;align-items:center;gap:8px;}
.hbtn{
  padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;
  border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.12);
  color:var(--white);
}
.hbtn:hover{background:rgba(255,255,255,0.22);}
.lang-toggle-header{display:flex;gap:4px;}
.lang-h-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.6);font-family:'Inter',sans-serif;transition:all 0.2s;}
.lang-h-btn.active{background:rgba(255,255,255,0.2);color:var(--white);}

/* WELCOME BANNER */
.welcome-banner{
  background:linear-gradient(135deg, var(--cp) 0%, var(--cp-light) 100%);
  color:var(--white);padding:20px 24px;
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;flex-wrap:wrap;
}
.welcome-text{}
.welcome-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;margin-bottom:3px;}
.welcome-sub{font-size:12px;opacity:0.75;}
.cp-logo-banner{height:36px;filter:brightness(0) invert(1);opacity:0.7;}

/* STATS */
.stats-bar{display:flex;gap:10px;padding:18px 24px 0;overflow-x:auto;scrollbar-width:none;}
.stats-bar::-webkit-scrollbar{display:none;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:14px 18px;min-width:110px;flex-shrink:0;box-shadow:var(--shadow);border:1px solid var(--border);}
.stat-num{font-size:26px;font-weight:700;font-family:'Playfair Display',serif;}
.stat-num.cp{color:var(--cp);} .stat-num.orange{color:var(--orange);} .stat-num.green{color:var(--green);} .stat-num.red{color:var(--red);}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500;}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;padding:14px 24px;flex-wrap:wrap;align-items:center;}
.search-wrap{flex:1;min-width:180px;position:relative;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:0.4;}
.search-input{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px 10px 36px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--cp);}
.filter-select{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);outline:none;cursor:pointer;}
.filter-select:focus{border-color:var(--cp);}

/* ISSUES */
.issues-container{padding:0 24px 32px;}
.issues-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}

/* ISSUE CARD */
.issue-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;}
.issue-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.1);}
.issue-card::before{content:'';display:block;height:4px;}
.issue-card.open::before{background:var(--red);}
.issue-card.in-progress::before{background:var(--orange);}
.issue-card.resolved::before{background:var(--green);}
.issue-card.not-fixable::before{background:var(--muted);}

/* Photo */
.issue-thumb{position:relative;width:100%;height:180px;background:var(--surface2);overflow:hidden;cursor:pointer;}
.issue-thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s;display:block;}
.issue-card:hover .issue-thumb img{transform:scale(1.03);}
.thumb-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.55) 100%);}
.thumb-stamp{position:absolute;bottom:10px;left:12px;right:12px;display:flex;flex-direction:column;gap:3px;}
.stamp-location{font-size:12px;font-weight:600;color:var(--white);background:rgba(139,26,74,0.85);padding:3px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;backdrop-filter:blur(4px);width:fit-content;}
.stamp-date{font-size:10px;font-weight:500;color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.4);padding:2px 7px;border-radius:5px;backdrop-filter:blur(4px);width:fit-content;}
.no-photo{width:100%;height:180px;background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);font-size:13px;}
.no-photo-icon{font-size:32px;opacity:0.25;}
.download-btn{position:absolute;top:10px;right:10px;background:rgba(255,255,255,0.9);color:var(--text);border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;backdrop-filter:blur(4px);transition:all 0.2s;display:flex;align-items:center;gap:4px;font-family:'Inter',sans-serif;}
.download-btn:hover{background:var(--white);}

/* Card body */
.issue-body{padding:14px 16px 16px;}
.issue-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px;}
.issue-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;flex:1;}
.status-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;white-space:nowrap;flex-shrink:0;letter-spacing:0.3px;text-transform:uppercase;}
.badge-open{background:var(--red-bg);color:var(--red);}
.badge-in-progress{background:var(--orange-bg);color:var(--orange);}
.badge-resolved{background:var(--green-bg);color:var(--green);}
.badge-not-fixable{background:#f3f3f5;color:var(--muted);}

.issue-meta{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.meta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.meta-icon{font-size:12px;}

.issue-comment{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:12px;padding:8px 10px;background:var(--off);border-radius:8px;border-left:3px solid var(--border);}
body.rtl .issue-comment{border-left:none;border-right:3px solid var(--border);}

.eta-badge{font-size:11px;font-weight:500;color:var(--orange);background:var(--orange-bg);padding:4px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;margin-bottom:10px;}

/* Mgmt note */
.mgmt-note{font-size:11px;color:var(--cp);padding:6px 10px;background:var(--cp-pale);border-radius:7px;margin-bottom:10px;display:flex;align-items:flex-start;gap:5px;}

/* Resolution section */
.resolution-section{
  background:var(--off);border-radius:10px;padding:12px;
  margin-bottom:12px;border:1px solid var(--border);
}
.resolution-section.resolved-view{border-color:var(--green);background:var(--green-bg);}
.res-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:8px;}
.res-photo-wrap{margin-bottom:8px;border-radius:8px;overflow:hidden;}
.res-photo-wrap img{width:100%;height:90px;object-fit:cover;display:block;}

/* Photo upload small */
.res-upload{border:2px dashed var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;background:var(--white);}
.res-upload:hover{border-color:var(--cp);background:var(--cp-pale);}
.res-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.res-upload-text{font-size:12px;color:var(--muted);}
.res-preview{width:100%;height:80px;object-fit:cover;border-radius:6px;display:none;margin-bottom:6px;}

/* Card actions */
.card-actions{display:flex;gap:6px;flex-wrap:wrap;}
.card-btn{flex:1;min-width:80px;padding:8px 6px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;font-family:'Inter',sans-serif;text-align:center;}
.btn-inprogress{background:var(--orange-bg);color:var(--orange);}
.btn-inprogress:hover{background:rgba(217,119,6,0.18);}
.btn-resolve{background:var(--green-bg);color:var(--green);}
.btn-resolve:hover{background:rgba(22,163,74,0.18);}
.btn-notfix{background:#f3f3f5;color:var(--muted);}
.btn-notfix:hover{background:#e8e8ec;}
.btn-save{background:var(--cp);color:var(--white);}
.btn-save:hover{background:var(--cp-dark);}

/* EMPTY */
.empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted);}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:0.35;}
.empty-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:14px;}

/* MODAL for note/resolve */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--white);border-radius:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal-header{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--white);z-index:2;}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:4px;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:18px 22px 22px;}

.mfield{margin-bottom:14px;}
.mfield label{display:block;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--cp);margin-bottom:6px;}
.mfield textarea,.mfield select{width:100%;background:var(--off);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s;}
.mfield textarea{resize:vertical;min-height:80px;line-height:1.5;}
.mfield textarea:focus,.mfield select:focus{border-color:var(--cp);box-shadow:0 0 0 3px var(--cp-pale);}

.photo-upload-area{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--off);position:relative;}
.photo-upload-area:hover{border-color:var(--cp);background:var(--cp-pale);}
.photo-upload-area.has-photo{border-style:solid;border-color:var(--cp);}
.upload-icon{font-size:28px;margin-bottom:6px;opacity:0.4;}
.upload-text{font-size:13px;color:var(--muted);}
.upload-preview{width:100%;max-height:160px;object-fit:cover;border-radius:8px;display:none;margin-top:8px;}
.photo-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}

.modal-action-btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:4px;}
.modal-action-btn.green{background:var(--green);color:var(--white);}
.modal-action-btn.green:hover{background:#15803d;}
.modal-action-btn.orange{background:var(--orange);color:var(--white);}
.modal-action-btn.orange:hover{background:#b45309;}
.modal-action-btn.grey{background:var(--surface2);color:var(--text);}
.modal-action-btn.grey:hover{background:var(--border);}

/* Status chips for dept */
.status-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.status-chip{padding:7px 14px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:var(--white);color:var(--muted);transition:all 0.2s;font-family:'Inter',sans-serif;}
.status-chip:hover{border-color:var(--cp);}
.status-chip.selected.open{border-color:var(--red);background:var(--red-bg);color:var(--red);}
.status-chip.selected.in-progress{border-color:var(--orange);background:var(--orange-bg);color:var(--orange);}
.status-chip.selected.resolved{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.status-chip.selected.not-fixable{border-color:var(--muted);background:#f3f3f5;color:var(--muted);}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:900;display:none;align-items:center;justify-content:center;padding:20px;}
.lightbox.show{display:flex;}
.lightbox img{max-width:100%;max-height:90vh;border-radius:8px;object-fit:contain;}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:40px;height:40px;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--white);padding:11px 22px;border-radius:100px;font-size:13px;font-weight:500;transition:transform 0.3s;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Priority */
.priority-high{color:var(--red);} .priority-medium{color:var(--orange);} .priority-low{color:var(--green);}

/* RTL */
body.rtl .search-icon{left:auto;right:12px;}
body.rtl .search-input{padding:10px 36px 10px 14px;}
body.rtl .issue-comment{border-left:none;border-right:3px solid var(--border);}

@media(max-width:600px){
  .stats-bar,.toolbar,.issues-container{padding-left:16px;padding-right:16px;}
  .issues-grid{grid-template-columns:1fr;}
  .header{padding:0 14px;}
  .welcome-banner{padding:16px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <img class="cp-logo-small" src="cp_logo.png" alt="CP">
    <div>
      <div class="header-title" id="hTitle">Issue Tracker</div>
    </div>
  </div>
  <div class="header-right">
    <span class="dept-badge" id="deptBadge">—</span>
    <div class="lang-toggle-header">
      <button class="lang-h-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-h-btn" onclick="setLang('ar')">ع</button>
    </div>
    <button class="hbtn" onclick="doLogout()" id="logoutBtn">Logout</button>
  </div>
</div>

<!-- WELCOME BANNER -->
<div class="welcome-banner">
  <div class="welcome-text">
    <div class="welcome-title" id="welcomeTitle">Good day!</div>
    <div class="welcome-sub" id="welcomeSub">Here are the issues assigned to your department</div>
  </div>
  <img class="cp-logo-banner" src="cp_logo.png" alt="Crowne Plaza">
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-card"><div class="stat-num cp" id="statTotal">0</div><div class="stat-label" id="slTotal">Assigned</div></div>
  <div class="stat-card"><div class="stat-num red" id="statOpen">0</div><div class="stat-label" id="slOpen">Open</div></div>
  <div class="stat-card"><div class="stat-num orange" id="statProgress">0</div><div class="stat-label" id="slProgress">In Progress</div></div>
  <div class="stat-card"><div class="stat-num green" id="statResolved">0</div><div class="stat-label" id="slResolved">Resolved</div></div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search issues…" oninput="renderIssues()">
  </div>
  <select class="filter-select" id="filterStatus" onchange="renderIssues()">
    <option value="">All Statuses</option>
    <option value="open">Open</option>
    <option value="in-progress">In Progress</option>
    <option value="resolved">Resolved</option>
    <option value="not-fixable">Not Fixable</option>
  </select>
</div>

<!-- ISSUES -->
<div class="issues-container">
  <div class="issues-grid" id="issuesGrid">
    <div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title" id="emptyTitle">All clear!</div><div class="empty-sub" id="emptySub">No issues assigned to your department</div></div>
  </div>
</div>

<!-- UPDATE MODAL -->
<div class="modal-overlay" id="updateModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="umTitle">Update Issue</div>
      <button class="modal-close" onclick="closeUpdateModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="mfield">
        <label id="umLabelStatus">Status</label>
        <div class="status-row" id="statusChips">
          <button class="status-chip in-progress" onclick="selectStatus('in-progress',this)" id="chipProgress">🟠 In Progress</button>
          <button class="status-chip resolved" onclick="selectStatus('resolved',this)" id="chipResolved">✅ Resolved</button>
          <button class="status-chip not-fixable" onclick="selectStatus('not-fixable',this)" id="chipNotFixable">⛔ Not Fixable</button>
        </div>
      </div>

      <div class="mfield">
        <label id="umLabelNote">Notes / Comment <span style="font-size:10px;color:var(--muted);font-weight:400;text-transform:none;">(optional)</span></label>
        <textarea id="umNote" placeholder="Add notes visible to management…"></textarea>
      </div>

      <div class="mfield" id="umPhotoField">
        <label id="umLabelPhoto">Resolution Photo <span style="font-size:10px;color:var(--muted);font-weight:400;text-transform:none;">(optional)</span></label>
        <div class="photo-upload-area" id="umPhotoArea">
          <input type="file" id="umPhotoInput" accept="image/*" onchange="handleResolutionPhoto(event)">
          <div class="upload-icon" id="umUploadIcon">📷</div>
          <div class="upload-text" id="umUploadText">Upload a resolution photo</div>
          <img id="umPreview" class="upload-preview" src="" alt="">
        </div>
      </div>

      <input type="hidden" id="umIssueId">
      <button class="modal-action-btn green" onclick="submitUpdate()" id="umSaveBtn">Save Update</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey:"AIzaSyC0IXfYNIbEjbLiPiY8C2C_JPAd5baTLMo",
  authDomain:"flowvalet-efd95.firebaseapp.com",
  databaseURL:"https://flowvalet-efd95-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"flowvalet-efd95",
  storageBucket:"flowvalet-efd95.appspot.com",
  messagingSenderId:"394962828421",
  appId:"1:394962828421:web:7bab162c88f3da9ee13dec"
};

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const storage = getStorage(app);

window.__db = db;
window.__update = update;
window.__sRef = sRef;
window.__uploadString = uploadString;
window.__getDownloadURL = getDownloadURL;
window.__storage = storage;
window.__fbReady = true;

onValue(ref(db,'cpissues/issues'), function(snap){
  var issues = {};
  if(snap.exists()) snap.forEach(function(c){ issues[c.key]=c.val(); });
  window.__issues = issues;
  filterAndRender();
  updateStats(issues);
});
</script>

<script>
// Auth guard
var session = JSON.parse(sessionStorage.getItem('cpUser')||'null');
if(!session || session.role !== 'department'){
  window.location.href = 'login.html';
}

var currentLang = sessionStorage.getItem('cpLang')||'en';
var myDept = session ? session.dept : '';

function doLogout(){ sessionStorage.removeItem('cpUser'); window.location.href='login.html'; }

// i18n
var T = {
  en:{
    hTitle:'Issue Tracker', logout:'Logout',
    welcomeTitle:'Good day, ', welcomeSub:'Here are the issues assigned to your department',
    slTotal:'Assigned', slOpen:'Open', slProgress:'In Progress', slResolved:'Resolved',
    searchPh:'Search issues…', allStatus:'All Statuses',
    open:'Open', inProgress:'In Progress', resolved:'Resolved', notFixable:'Not Fixable',
    high:'High', medium:'Medium', low:'Low',
    updateBtn:'Update', downloadBtn:'Download',
    umTitle:'Update Issue', umLabelStatus:'Status',
    umLabelNote:'Notes / Comment', umLabelPhoto:'Resolution Photo',
    umSaveBtn:'Save Update', chipProgress:'🟠 In Progress',
    chipResolved:'✅ Resolved', chipNotFixable:'⛔ Not Fixable',
    emptyTitle:'All clear!', emptySub:'No issues assigned to your department',
    priorityLabel:'Priority', etaLabel:'ETA',
    mgmtNote:'Management note', reportedBy:'Reported',
    toastUpdated:'Update saved', noPhoto:'No photo',
    resPhotoLabel:'Resolution photo', deptNoteLabel:'Your note',
  },
  ar:{
    hTitle:'نظام تتبع المشكلات', logout:'تسجيل الخروج',
    welcomeTitle:'أهلاً، ', welcomeSub:'هذه المشاكل المعينة لقسمك',
    slTotal:'معين لك', slOpen:'مفتوحة', slProgress:'قيد المعالجة', slResolved:'تم الحل',
    searchPh:'ابحث في المشاكل…', allStatus:'جميع الحالات',
    open:'مفتوحة', inProgress:'قيد المعالجة', resolved:'تم الحل', notFixable:'غير قابلة للإصلاح',
    high:'عالية', medium:'متوسطة', low:'منخفضة',
    updateBtn:'تحديث', downloadBtn:'تحميل',
    umTitle:'تحديث المشكلة', umLabelStatus:'الحالة',
    umLabelNote:'ملاحظات / تعليق', umLabelPhoto:'صورة الحل',
    umSaveBtn:'حفظ التحديث', chipProgress:'🟠 قيد المعالجة',
    chipResolved:'✅ تم الحل', chipNotFixable:'⛔ غير قابلة للإصلاح',
    emptyTitle:'لا توجد مشاكل!', emptySub:'لا توجد مشاكل معينة لقسمك',
    priorityLabel:'الأولوية', etaLabel:'الموعد المتوقع',
    mgmtNote:'ملاحظة الإدارة', reportedBy:'أُبلغ',
    toastUpdated:'تم حفظ التحديث', noPhoto:'لا توجد صورة',
    resPhotoLabel:'صورة الحل', deptNoteLabel:'ملاحظتك',
  }
};
function t(k){ return (T[currentLang]||T.en)[k]||k; }

function setLang(lang){
  currentLang=lang;
  sessionStorage.setItem('cpLang',lang);
  document.body.classList.toggle('rtl',lang==='ar');
  document.getElementById('htmlRoot').setAttribute('dir',lang==='ar'?'rtl':'ltr');
  document.querySelectorAll('.lang-h-btn').forEach(function(b){
    b.classList.toggle('active',(lang==='en'&&b.textContent==='EN')||(lang==='ar'&&b.textContent==='ع'));
  });
  applyStrings();
  filterAndRender();
  if(window.__issues) updateStats(window.__issues);
}

function applyStrings(){
  document.getElementById('hTitle').textContent = t('hTitle');
  document.getElementById('logoutBtn').textContent = t('logout');
  document.getElementById('deptBadge').textContent = '🏨 '+myDept;
  var name = currentLang==='ar' ? session.nameAr : session.nameEn;
  document.getElementById('welcomeTitle').textContent = t('welcomeTitle')+(name||myDept);
  document.getElementById('welcomeSub').textContent = t('welcomeSub');
  document.getElementById('slTotal').textContent = t('slTotal');
  document.getElementById('slOpen').textContent = t('slOpen');
  document.getElementById('slProgress').textContent = t('slProgress');
  document.getElementById('slResolved').textContent = t('slResolved');
  document.getElementById('searchInput').placeholder = t('searchPh');
  document.getElementById('emptyTitle').textContent = t('emptyTitle');
  document.getElementById('emptySub').textContent = t('emptySub');
  document.getElementById('umTitle').textContent = t('umTitle');
  document.getElementById('umSaveBtn').textContent = t('umSaveBtn');
  document.getElementById('chipProgress').textContent = t('chipProgress');
  document.getElementById('chipResolved').textContent = t('chipResolved');
  document.getElementById('chipNotFixable').textContent = t('chipNotFixable');
}
setLang(currentLang);

// Stats
function updateStats(issues){
  var myIssues = Object.keys(issues).filter(function(id){
    return (issues[id].assignedDepts||[]).includes(myDept);
  });
  var open=myIssues.filter(function(id){return issues[id].status==='open';}).length;
  var prog=myIssues.filter(function(id){return issues[id].status==='in-progress';}).length;
  var res=myIssues.filter(function(id){return issues[id].status==='resolved';}).length;
  document.getElementById('statTotal').textContent   = myIssues.length;
  document.getElementById('statOpen').textContent    = open;
  document.getElementById('statProgress').textContent= prog;
  document.getElementById('statResolved').textContent= res;
}

// Render
function filterAndRender(){ renderIssues(); }

function renderIssues(){
  var issues = window.__issues||{};
  var search  = (document.getElementById('searchInput').value||'').toLowerCase();
  var fStatus = document.getElementById('filterStatus').value;

  var ids = Object.keys(issues).filter(function(id){
    var issue = issues[id];
    if(!(issue.assignedDepts||[]).includes(myDept)) return false;
    var matchSearch = !search ||
      (issue.title||'').toLowerCase().includes(search) ||
      (issue.location||'').toLowerCase().includes(search) ||
      (issue.comment||'').toLowerCase().includes(search);
    var matchStatus = !fStatus || issue.status===fStatus;
    return matchSearch && matchStatus;
  });

  var order={'open':0,'in-progress':1,'resolved':2,'not-fixable':3};
  ids.sort(function(a,b){
    var oa=order[issues[a].status]||0,ob=order[issues[b].status]||0;
    if(oa!==ob) return oa-ob;
    return (issues[b].createdAt||'')>(issues[a].createdAt||'')?1:-1;
  });

  var grid=document.getElementById('issuesGrid');
  if(ids.length===0){
    grid.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">'+t('emptyTitle')+'</div><div class="empty-sub">'+t('emptySub')+'</div></div>';
    return;
  }
  grid.innerHTML=ids.map(function(id){ return buildCard(id,issues[id]); }).join('');
}

function buildCard(id, issue){
  var statusLabels={open:t('open'),'in-progress':t('inProgress'),resolved:t('resolved'),'not-fixable':t('notFixable')};
  var statusBadge={open:'badge-open','in-progress':'badge-in-progress',resolved:'badge-resolved','not-fixable':'badge-not-fixable'};
  var priorityColor={high:'priority-high',medium:'priority-medium',low:'priority-low'};
  var priorityIcon={high:'🔴',medium:'🟠',low:'🟢'};
  var date=issue.createdAt?new Date(issue.createdAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'';
  var time=issue.createdAt?new Date(issue.createdAt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):'';

  // Photo
  var photoHtml='';
  if(issue.photoURL){
    photoHtml='<div class="issue-thumb" onclick="openLightbox(\''+escHtml(issue.photoURL)+'\')">'+
      '<img src="'+escHtml(issue.photoURL)+'" alt="" loading="lazy">'+
      '<div class="thumb-overlay"></div>'+
      '<div class="thumb-stamp">'+
        '<div class="stamp-location">📍 '+escHtml(issue.location||'')+'</div>'+
        '<div class="stamp-date">'+date+' · '+time+'</div>'+
      '</div>'+
      '<button class="download-btn" onclick="event.stopPropagation();downloadPhoto(\''+escHtml(issue.photoURL)+'\',\''+escHtml(issue.title||'issue')+'\')">⬇ '+t('downloadBtn')+'</button>'+
    '</div>';
  } else {
    photoHtml='<div class="no-photo"><div class="no-photo-icon">📷</div><span>'+t('noPhoto')+'</span></div>';
  }

  var etaHtml='';
  if(issue.etaFrom||issue.etaTo){
    etaHtml='<div class="eta-badge">📅 '+t('etaLabel')+': '+(issue.etaFrom||'?')+' → '+(issue.etaTo||'?')+'</div>';
  }

  var commentHtml=issue.comment?'<div class="issue-comment">'+escHtml(issue.comment)+'</div>':'';
  var mgmtNoteHtml=issue.mgmtNote?'<div class="mgmt-note">👑 '+escHtml(issue.mgmtNote)+'</div>':'';

  // Resolution section
  var resHtml='';
  if(issue.resolutionPhotoURL||issue.deptNote){
    resHtml='<div class="resolution-section resolved-view">'+
      '<div class="res-title">'+t('resPhotoLabel')+'</div>'+
      (issue.resolutionPhotoURL?'<div class="res-photo-wrap"><img src="'+escHtml(issue.resolutionPhotoURL)+'" onclick="openLightbox(\''+escHtml(issue.resolutionPhotoURL)+'\')" style="cursor:pointer;" loading="lazy"></div>':'')+
      (issue.deptNote?'<div style="font-size:12px;color:var(--green);margin-top:4px;">💬 '+escHtml(issue.deptNote)+'</div>':'')+
    '</div>';
  }

  // Actions — don't show update if already resolved/not-fixable
  var actionsHtml='';
  if(issue.status!=='resolved'&&issue.status!=='not-fixable'){
    actionsHtml='<button class="card-btn btn-save" onclick="openUpdateModal(\''+id+'\')">✏️ '+t('updateBtn')+'</button>';
  } else {
    actionsHtml='<button class="card-btn btn-save" onclick="openUpdateModal(\''+id+'\')">✏️ '+t('updateBtn')+'</button>';
  }

  return '<div class="issue-card '+issue.status+'" id="card_'+id+'">'+
    photoHtml+
    '<div class="issue-body">'+
      '<div class="issue-header">'+
        '<div class="issue-title">'+escHtml(issue.title||'')+'</div>'+
        '<span class="status-badge '+statusBadge[issue.status]+'">'+statusLabels[issue.status]+'</span>'+
      '</div>'+
      '<div class="issue-meta">'+
        '<span class="meta-item"><span class="meta-icon">📍</span>'+escHtml(issue.location||'')+'</span>'+
        '<span class="meta-item '+priorityColor[issue.priority]+'"><span class="meta-icon">'+priorityIcon[issue.priority]+'</span>'+t(issue.priority||'medium')+'</span>'+
        '<span class="meta-item"><span class="meta-icon">📅</span>'+date+'</span>'+
      '</div>'+
      etaHtml+
      commentHtml+
      mgmtNoteHtml+
      resHtml+
      '<div class="card-actions">'+actionsHtml+'</div>'+
    '</div>'+
  '</div>';
}

// Update modal
var selectedStatus = null;
var resolutionPhotoBase64 = null;

function openUpdateModal(id){
  var issue=(window.__issues||{})[id];
  if(!issue) return;
  document.getElementById('umIssueId').value=id;
  document.getElementById('umNote').value=issue.deptNote||'';
  selectedStatus=issue.status;
  resolutionPhotoBase64=null;
  resetResPhoto();
  // Set chip
  document.querySelectorAll('.status-chip').forEach(function(c){ c.classList.remove('selected'); });
  var chipMap={'in-progress':'chipProgress','resolved':'chipResolved','not-fixable':'chipNotFixable'};
  if(chipMap[issue.status]) document.getElementById(chipMap[issue.status]).classList.add('selected',issue.status);
  document.getElementById('updateModal').classList.add('show');
}

function closeUpdateModal(){
  document.getElementById('updateModal').classList.remove('show');
  selectedStatus=null;
}

function selectStatus(status, el){
  selectedStatus=status;
  document.querySelectorAll('.status-chip').forEach(function(c){ c.classList.remove('selected'); });
  el.classList.add('selected',status);
}

function handleResolutionPhoto(e){
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    resolutionPhotoBase64=ev.target.result;
    document.getElementById('umPreview').src=resolutionPhotoBase64;
    document.getElementById('umPreview').style.display='block';
    document.getElementById('umUploadIcon').style.display='none';
    document.getElementById('umUploadText').style.display='none';
    document.getElementById('umPhotoArea').classList.add('has-photo');
  };
  reader.readAsDataURL(file);
}

function resetResPhoto(){
  document.getElementById('umPreview').style.display='none';
  document.getElementById('umPreview').src='';
  document.getElementById('umUploadIcon').style.display='block';
  document.getElementById('umUploadText').style.display='block';
  document.getElementById('umPhotoArea').classList.remove('has-photo');
  document.getElementById('umPhotoInput').value='';
}

async function submitUpdate(){
  var id=document.getElementById('umIssueId').value;
  if(!id) return;
  var note=document.getElementById('umNote').value.trim();
  var btn=document.getElementById('umSaveBtn');
  btn.textContent='Saving…'; btn.disabled=true;

  var updateData={
    status: selectedStatus||'in-progress',
    deptNote: note,
    updatedBy: session.nameEn||session.username,
    updatedAt: new Date().toISOString(),
  };

  if(resolutionPhotoBase64){
    try{
      var storRef=window.__sRef(window.__storage,'cpissues/resolution/'+id);
      await window.__uploadString(storRef,resolutionPhotoBase64,'data_url');
      updateData.resolutionPhotoURL=await window.__getDownloadURL(storRef);
    }catch(e){
      updateData.resolutionPhotoURL=resolutionPhotoBase64;
    }
  }

  await window.__update(window.__ref(window.__db,'cpissues/issues/'+id), updateData);
  showToast(t('toastUpdated'));
  btn.textContent=t('umSaveBtn'); btn.disabled=false;
  closeUpdateModal();
}

function openLightbox(url){ document.getElementById('lightboxImg').src=url; document.getElementById('lightbox').classList.add('show'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('show'); }
function downloadPhoto(url,name){ var a=document.createElement('a'); a.href=url; a.download=(name||'photo')+'.jpg'; a.target='_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2800); }
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("./sw.js")
      .then(function() { console.log("[CP Issues] SW ready"); })
      .catch(function(e) { console.log("[CP Issues] SW error", e); });
  });
}
</script>
